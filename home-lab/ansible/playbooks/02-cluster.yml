---
# ============================================================
# Playbook 02 — Cluster Proxmox (mqt-homelab)
# ============================================================
# Cria o cluster no nó principal (pve-optiplex) e junta o
# nó secundário (pve-inspiron).
#
# IMPORTANTE: Este playbook deve ser executado DEPOIS que
# ambos os nós estejam acessíveis via SSH e com /etc/hosts
# configurado (via 00-bootstrap.yml).
#
# Uso:
#   ansible-playbook playbooks/02-cluster.yml
# ============================================================

- name: Cluster — Criar cluster mqt-homelab
  hosts: proxmox
  gather_facts: true
  serial: 1  # Executar um nó por vez (ordem importa!)

  tasks:
    # ── Verificar se já existe cluster ───────────────────
    - name: Verificar status do cluster atual
      ansible.builtin.command: pvecm status
      register: cluster_status
      changed_when: false
      failed_when: false

    # ── Criar cluster no nó principal ────────────────────
    - name: "Criar cluster '{{ cluster_name }}' no nó principal"
      ansible.builtin.command: "pvecm create {{ cluster_name }}"
      when:
        - pve_is_primary | bool
        - "'does not exist' in cluster_status.stderr or cluster_status.rc != 0"
      register: cluster_create

    - name: Aguardar cluster estabilizar
      ansible.builtin.pause:
        seconds: 10
      when: cluster_create is changed

    # ── Juntar nó secundário ao cluster ──────────────────
    - name: "Juntar ao cluster via {{ cluster_primary_ip }}"
      ansible.builtin.expect:
        command: "pvecm add {{ cluster_primary_ip }} --force"
        responses:
          "(?i)password": "{{ ansible_password | default(ansible_ssh_pass) | default('') }}"
          "(?i)fingerprint": "yes"
          "(?i)Are you sure": "yes"
        timeout: 60
      when:
        - not (pve_is_primary | bool)
        - "'does not exist' in cluster_status.stderr or cluster_status.rc != 0"
      register: cluster_join
      ignore_errors: true

    - name: Aguardar sincronização do cluster
      ansible.builtin.pause:
        seconds: 15
      when: cluster_join is changed

    # ── Verificação final ────────────────────────────────
    - name: Verificar status final do cluster
      ansible.builtin.command: pvecm status
      register: cluster_final
      changed_when: false

    - name: Exibir status do cluster
      ansible.builtin.debug:
        var: cluster_final.stdout_lines

    - name: Listar nós do cluster
      ansible.builtin.command: pvecm nodes
      register: cluster_nodes
      changed_when: false

    - name: Exibir nós do cluster
      ansible.builtin.debug:
        var: cluster_nodes.stdout_lines
