# Esquema de labels padrão Scrum-compatível.
# Aplique com: scripts/apply_labels.sh assets/labels_default.yml owner/repo
# Customize `area:*` para o domínio do seu produto antes de aplicar.

labels:
  # ─── type: o que é a issue ─────────────────────────────────────
  - name: "type:epic"
    color: "1f77b4"
    description: "Issue-mãe de um épico (2-6 sprints), com checklist de filhas."
  - name: "type:user-story"
    color: "1f77b4"
    description: "Incremento de valor para um usuário, com critérios de aceite."
  - name: "type:task"
    color: "1f77b4"
    description: "Trabalho técnico sem valor direto a usuário (setup, refactor)."
  - name: "type:bug"
    color: "1f77b4"
    description: "Comportamento divergente do esperado."
  - name: "type:spike"
    color: "1f77b4"
    description: "Investigação time-boxed para reduzir incerteza."
  - name: "type:tech-debt"
    color: "1f77b4"
    description: "Dívida técnica conhecida com plano de pagamento."
  - name: "type:docs"
    color: "1f77b4"
    description: "Apenas documentação."

  # ─── priority: urgência ────────────────────────────────────────
  - name: "priority:p0"
    color: "b60205"
    description: "Crítico — produção quebrada. Pause outras coisas."
  - name: "priority:p1"
    color: "d93f0b"
    description: "Alto — entra no próximo sprint."
  - name: "priority:p2"
    color: "fbca04"
    description: "Médio — próximos 2-3 sprints."
  - name: "priority:p3"
    color: "c5def5"
    description: "Baixo — bom ter, sem pressa."

  # ─── size: story points (espelho do campo no Project) ─────────
  - name: "size:xs"
    color: "0e8a16"
    description: "1 ponto"
  - name: "size:s"
    color: "0e8a16"
    description: "2 pontos"
  - name: "size:m"
    color: "0e8a16"
    description: "3 pontos"
  - name: "size:l"
    color: "0e8a16"
    description: "5 pontos"
  - name: "size:xl"
    color: "0e8a16"
    description: "8 pontos"
  - name: "size:xxl"
    color: "0e8a16"
    description: "13 pontos — sinal de quebra"

  # ─── status: sinais soft (opcional se usa Project v2) ─────────
  - name: "status:blocked"
    color: "5319e7"
    description: "Bloqueada por dependência externa."
  - name: "status:needs-design"
    color: "5319e7"
    description: "Falta decisão de UX antes de mexer no código."
  - name: "status:needs-spec"
    color: "5319e7"
    description: "Falta refinamento de produto."

  # ─── needs: triage ────────────────────────────────────────────
  - name: "needs:triage"
    color: "fef2c0"
    description: "Recém-chegada, precisa categorizar."
  - name: "needs:repro"
    color: "fef2c0"
    description: "Bug sem passos de reprodução claros."
  - name: "needs:info"
    color: "fef2c0"
    description: "Aguardando resposta de quem abriu."

  # ─── area: customize para o seu produto ───────────────────────
  # Apague/renomeie. Crie só os que vão ter ≥3 issues no curto prazo.
  - name: "area:auth"
    color: "bfd4f2"
    description: "Autenticação, sessão, recuperação de senha."
  - name: "area:billing"
    color: "bfd4f2"
    description: "Cobrança, planos, faturas."
  - name: "area:infra"
    color: "bfd4f2"
    description: "CI/CD, deploy, observabilidade."
  - name: "area:docs"
    color: "bfd4f2"
    description: "Documentação, READMEs, guias."
