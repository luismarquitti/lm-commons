---
# ============================================================
# Playbook 07 — OpenClaw Bare-Metal (Dell Optiplex 7040)
# ============================================================
# Provisiona ferramentas de IA/Dev no nó bare-metal lm-claw.
# O setup base (Zsh, Git, Shell) é feito via 00-common-setup.yml.
# ============================================================

- name: OpenClaw — Configurar Rede e Hostname
  hosts: lm-claw
  become: true
  tags: [base, network]
  tasks:
    - name: Configurar IP estático em /etc/network/interfaces
      ansible.builtin.copy:
        dest: /etc/network/interfaces
        content: |
          auto lo
          iface lo inet loopback

          auto enp0s31f6
          iface enp0s31f6 inet static
            address 192.168.3.10/24
            gateway 192.168.3.1
            dns-nameservers 192.168.3.5 8.8.8.8
        owner: root
        group: root
        mode: "0644"

    - name: Configurar /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        block: |
          192.168.3.10  lm-claw lm-claw.lan
          192.168.3.50  pve-inspiron pve-inspiron.lan
          192.168.3.5   adguard adguard.lan
        marker: "# {mark} ANSIBLE MANAGED — homelab"

    - name: Configurar hostname
      ansible.builtin.hostname:
        name: lm-claw


- name: OpenClaw — Instalar Homebrew
  hosts: lm-claw
  become: false
  tags: [brew, homebrew]
  tasks:
    - name: Executar script de instalação do Homebrew (Non-Interactive)
      ansible.builtin.shell: |
        NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      args:
        creates: /home/linuxbrew/.linuxbrew/bin/brew

    - name: Criar symlink do brew no PATH do sistema
      ansible.builtin.file:
        src: /home/linuxbrew/.linuxbrew/bin/brew
        dest: /usr/local/bin/brew
        state: link
      become: true


- name: OpenClaw — Instalar Node.js via NVM
  hosts: lm-claw
  become: false
  tags: [node, nvm]
  tasks:
    - name: Instalar NVM para o usuário luismarquitti
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
      args:
        creates: /home/luismarquitti/.nvm/nvm.sh

    - name: Instalar Node.js LTS via NVM
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        source "$NVM_DIR/nvm.sh"
        nvm install --lts
        nvm use --lts
        nvm alias default node
      args:
        executable: /bin/bash
        creates: /home/luismarquitti/.nvm/alias/default

    - name: Criar symlinks do node no PATH do sistema
      ansible.builtin.shell: |
        export NVM_DIR="/home/luismarquitti/.nvm"
        source "$NVM_DIR/nvm.sh"
        NVM_NODE=$(nvm which current)
        ln -sf "$NVM_NODE" /usr/local/bin/node
        ln -sf "$NVM_NODE" /usr/bin/node
        ln -sf "$(dirname $NVM_NODE)/npm" /usr/local/bin/npm
        ln -sf "$(dirname $NVM_NODE)/npx" /usr/local/bin/npx
      args:
        executable: /bin/bash
      become: true

    - name: Instalar Gemini CLI globalmente
      ansible.builtin.shell: |
        export NVM_DIR="/home/luismarquitti/.nvm"
        source "$NVM_DIR/nvm.sh"
        npm install -g @google/gemini-cli
      args:
        executable: /bin/bash
      register: gemini_install
      changed_when: "'added' in gemini_install.stdout"


- name: OpenClaw — Instalar Ollama
  hosts: lm-claw
  become: true
  tags: [ollama]
  tasks:
    - name: Instalar Ollama
      ansible.builtin.shell: |
        curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    - name: Garantir serviço Ollama está habilitado
      ansible.builtin.systemd:
        name: ollama
        enabled: true
        state: started

    - name: Baixar modelos Ollama
      ansible.builtin.command: "ollama pull {{ item }}"
      loop: "{{ ollama_models | default(['gemma4:e2b', 'gemma3:4b', 'qwen3:8b', 'nomic-embed-text:latest']) }}"
      register: ollama_pull
      changed_when: "'success' in (ollama_pull.stdout | default(''))"
      become: false


- name: OpenClaw — Instalar e Configurar Tailscale
  hosts: lm-claw
  become: true
  tags: [tailscale]
  tasks:
    - name: Instalar Tailscale
      ansible.builtin.shell: |
        curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Habilitar IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        state: present
        reload: true


- name: OpenClaw — Garantir diretórios e permissões
  hosts: lm-claw
  become: true
  tags: [dirs]
  tasks:
    - name: Criar diretórios do OpenClaw
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: luismarquitti
        group: luismarquitti
        mode: "0755"
      loop:
        - /home/luismarquitti/.openclaw
        - /home/luismarquitti/.openclaw/workspace
        - /home/luismarquitti/.openclaw/agents
        - /home/luismarquitti/.openclaw/logs

    - name: Criar mount point para HDD de dados
      ansible.builtin.file:
        path: /mnt/data
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Montar HDD 298GB (storage openclaw) — ext4
      ansible.posix.mount:
        path: /mnt/openclaw-storage
        src: /dev/sdb1
        fstype: ext4
        opts: defaults,nofail
        state: mounted

- name: OpenClaw — PKM / Obsidian Vault
  hosts: lm-claw
  become: false
  vars:
    obsidian_vault_repo: "https://github.com/luismarquitti/obsidian-vault.git"
    obsidian_vault_dest: "/home/luismarquitti/.openclaw/workspace/obsidian-vault"
  tags: [vault, pkm]
  tasks:
    - name: Clonar repositório do Obsidian Vault para o workspace
      ansible.builtin.git:
        repo: "{{ obsidian_vault_repo }}"
        dest: "{{ obsidian_vault_dest }}"
        version: main
        force: true
      register: vault_clone
      until: vault_clone is success
      retries: 3
      delay: 5

- name: OpenClaw — Instalação Final
  hosts: lm-claw
  become: false
  tags: [openclaw, install]
  tasks:
    - name: Instalar OpenClaw via script oficial
      ansible.builtin.shell: |
        curl -fsSL https://openclaw.ai/install.sh | bash
      args:
        creates: /home/luismarquitti/.local/bin/openclaw
