---
# ============================================================
# Playbook 07 — OpenClaw Bare-Metal (Dell Optiplex 7040)
# ============================================================
# Provisiona o OpenClaw diretamente no hardware do Optiplex,
# sem camada de virtualização (Proxmox removido).
#
# Pré-requisito: Debian 12 instalado no Optiplex com:
#   - IP estático: 192.168.3.30
#   - usuário: luismarquitti (com sudo)
#   - SSH key de ~/.ssh/id_ed25519 autorizada
#
# Uso:
#   ansible-playbook playbooks/07-openclaw-deploy.yml
#   ansible-playbook playbooks/07-openclaw-deploy.yml --tags ollama
# ============================================================

- name: OpenClaw — Configurar Sistema Base
  hosts: lm-claw
  become: true
  tags: [base]
  tasks:
    - name: Atualizar cache do apt
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Instalar pacotes base
      ansible.builtin.apt:
        name:
          - curl
          - git
          - build-essential
          - python3
          - python3-pip
          - unzip
          - rsync
          - zstd
          - htop
          - iotop
          - net-tools
          - sudo
        state: present

    - name: Garantir usuário luismarquitti existe
      ansible.builtin.user:
        name: luismarquitti
        shell: /bin/bash
        groups: sudo
        append: true
        create_home: true

    - name: Configurar IP estático em /etc/network/interfaces
      ansible.builtin.copy:
        dest: /etc/network/interfaces
        content: |
          auto lo
          iface lo inet loopback

          auto enp2s0
          iface enp2s0 inet static
            address 192.168.3.30/24
            gateway 192.168.3.1
            dns-nameservers 192.168.3.5 8.8.8.8
        owner: root
        group: root
        mode: "0644"
      notify: restart networking

    - name: Configurar /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        block: |
          192.168.3.30  lm-claw lm-claw.lan
          192.168.3.50  pve-inspiron pve-inspiron.lan
          192.168.3.5   adguard adguard.lan
        marker: "# {mark} ANSIBLE MANAGED — homelab"

    - name: Configurar hostname
      ansible.builtin.hostname:
        name: lm-claw

  handlers:
    - name: restart networking
      ansible.builtin.service:
        name: networking
        state: restarted


- name: OpenClaw — Instalar Node.js via NVM
  hosts: lm-claw
  become: false
  tags: [node, nvm]
  tasks:
    - name: Instalar NVM para o usuário luismarquitti
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
      args:
        creates: /home/luismarquitti/.nvm/nvm.sh

    - name: Instalar Node.js LTS via NVM
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        source "$NVM_DIR/nvm.sh"
        nvm install --lts
        nvm use --lts
        nvm alias default node
      args:
        executable: /bin/bash
        creates: /home/luismarquitti/.nvm/alias/default

    - name: Criar symlinks do node no PATH do sistema
      ansible.builtin.shell: |
        export NVM_DIR="/home/luismarquitti/.nvm"
        source "$NVM_DIR/nvm.sh"
        NVM_NODE=$(nvm which current)
        ln -sf "$NVM_NODE" /usr/local/bin/node
        ln -sf "$NVM_NODE" /usr/bin/node
        ln -sf "$(dirname $NVM_NODE)/npm" /usr/local/bin/npm
        ln -sf "$(dirname $NVM_NODE)/npx" /usr/local/bin/npx
      args:
        executable: /bin/bash
      become: true


- name: OpenClaw — Instalar Ollama
  hosts: lm-claw
  become: true
  tags: [ollama]
  tasks:
    - name: Instalar Ollama
      ansible.builtin.shell: |
        curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    - name: Garantir serviço Ollama está habilitado
      ansible.builtin.systemd:
        name: ollama
        enabled: true
        state: started

    - name: Baixar modelos Ollama
      ansible.builtin.command: "ollama pull {{ item }}"
      loop: "{{ ollama_models | default(['gemma4:e2b', 'gemma3:4b', 'qwen3:8b', 'nomic-embed-text:latest']) }}"
      register: ollama_pull
      changed_when: "'success' in (ollama_pull.stdout | default(''))"
      become: false


- name: OpenClaw — Instalar e Configurar Tailscale
  hosts: lm-claw
  become: true
  tags: [tailscale]
  tasks:
    - name: Instalar Tailscale
      ansible.builtin.shell: |
        curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Habilitar IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        state: present
        reload: true

    # Autenticação Tailscale é interativa — executar manualmente:
    # tailscale up --advertise-routes=192.168.3.0/24 --accept-routes


- name: OpenClaw — Garantir diretórios e permissões
  hosts: lm-claw
  become: true
  tags: [dirs]
  tasks:
    - name: Criar diretórios do OpenClaw
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: luismarquitti
        group: luismarquitti
        mode: "0755"
      loop:
        - /home/luismarquitti/.openclaw
        - /home/luismarquitti/.openclaw/workspace
        - /home/luismarquitti/.openclaw/agents
        - /home/luismarquitti/.openclaw/logs

    - name: Criar mount point para HDD de dados
      ansible.builtin.file:
        path: /mnt/data
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Montar HDD 298GB (storage openclaw) — ext4
      ansible.posix.mount:
        path: /mnt/openclaw-storage
        src: /dev/sdb1
        fstype: ext4
        opts: defaults,nofail
        state: mounted

- name: OpenClaw — PKM / Obsidian Vault
  hosts: lm-claw
  become: false
  tags: [vault, pkm]
  tasks:
    - name: Clonar repositório do Obsidian Vault para o workspace
      ansible.builtin.git:
        repo: "{{ obsidian_vault_repo }}"
        dest: "{{ obsidian_vault_dest }}"
        version: main
        force: true
      register: vault_clone
      until: vault_clone is success
      retries: 3
      delay: 5

# NOTA: A instalação do OpenClaw em si (pnpm install -g openclaw, openclaw configure,
# openclaw gateway install) é feita manualmente pois requer autenticação OAuth interativa.
# Ver docs/openclaw-manual-config-log.md para o passo-a-passo completo.
