---
# ============================================================
# Playbook 07 — Deploy Openclaw Definitive Instance
# ============================================================
# Provisiona o ambiente para a instância definitiva do Openclaw.
#
# Uso:
#   ansible-playbook playbooks/07-openclaw-deploy.yml
# ============================================================

# - name: Openclaw — Provisionar LXC no Proxmox
#   import_playbook: 05-lxc-deploy.yml
#   vars:
#     ansible_limit: openclaw-prod

- name: Openclaw — Configurar Ambiente e Dependências
  hosts: openclaw-prod
  become: true
  tasks:
    - name: Atualizar cache do apt
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Instalar pacotes base
      ansible.builtin.apt:
        name:
          - curl
          - git
          - build-essential
          - python3
          - python3-pip
          - unzip
          - rsync
          - zstd
        state: present

    - name: Instalar NVM para o usuário luismarquitti
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
      args:
        creates: /home/luismarquitti/.nvm/nvm.sh
      become_user: luismarquitti

    - name: Instalar Node.js LTS via NVM
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        source "$NVM_DIR/nvm.sh"
        nvm install --lts
        nvm use --lts
        nvm alias default node
      args:
        executable: /bin/bash
        creates: /home/luismarquitti/.nvm/alias/default
      become_user: luismarquitti

    - name: Criar symlinks do node no PATH do sistema
      ansible.builtin.shell: |
        export NVM_DIR="/home/luismarquitti/.nvm"
        source "$NVM_DIR/nvm.sh"
        NVM_NODE=$(nvm which current)
        ln -sf "$NVM_NODE" /usr/local/bin/node
        ln -sf "$NVM_NODE" /usr/bin/node
        ln -sf "$(dirname $NVM_NODE)/npm" /usr/local/bin/npm
        ln -sf "$(dirname $NVM_NODE)/npx" /usr/local/bin/npx
      args:
        executable: /bin/bash

    - name: Instalar Ollama
      ansible.builtin.shell: |
        curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    - name: Garantir diretórios do Openclaw
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user | default('root') }}"
        group: "{{ ansible_user | default('root') }}"
        mode: "0755"
      loop:
        - "/home/{{ ansible_user | default('root') }}/.openclaw"
        - "/home/{{ ansible_user | default('root') }}/.openclaw/workspace"
        - "/home/{{ ansible_user | default('root') }}/.openclaw/agents"

    - name: Baixar modelos Ollama necessários
      ansible.builtin.command: "ollama pull {{ item }}"
      loop:
        - gemma2:2b
        - nomic-embed-text:latest
      register: ollama_pull
      changed_when: "'success' in ollama_pull.stdout"

# NOTA: Tailscale dentro do LXC openclaw-prod requer investigação adicional.
# tailscaled falha sem nesting=1 ou keyctl=1 nas features do LXC (pct config 200).
# Por ora o gateway funciona sem exposição Tailscale direta — acesso via Telegram/loopback.
