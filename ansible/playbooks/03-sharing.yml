---
# ============================================================
# Playbook 03 — Compartilhamento de Arquivos (Samba)
# ============================================================
# Configura Samba no pve-inspiron para compartilhar o HDD 1TB
# (movido do Optiplex) via \\192.168.3.50\data no Windows Explorer.
#
# Uso:
#   ansible-playbook playbooks/03-sharing.yml
# ============================================================

- name: Sharing — Montar HDD 1TB e configurar Samba no pve-inspiron
  hosts: pve-inspiron
  become: true
  gather_facts: true

  tasks:
    # ── HDD 1TB (NTFS, dados pessoais) ───────────────────
    - name: "[HDD 1TB] Instalar ntfs-3g"
      ansible.builtin.apt:
        name: ntfs-3g
        state: present

    - name: "[HDD 1TB] Criar ponto de montagem"
      ansible.builtin.file:
        path: "{{ samba_share_path }}"
        state: directory
        mode: '0755'

    - name: "[HDD 1TB] Montar e adicionar ao fstab (sem formatar!)"
      ansible.posix.mount:
        path: "{{ samba_share_path }}"
        src: "{{ storage_disks.data_storage.device }}"
        fstype: "{{ storage_disks.data_storage.fstype }}"
        opts: "defaults,nofail,remove_hiberfile"
        state: mounted

    # ── Samba (acesso do Lenovo via Windows Explorer) ─────
    - name: "[Samba] Instalar samba"
      ansible.builtin.apt:
        name: samba
        state: present

    - name: "[Samba] Configurar compartilhamento do HDD 1TB"
      ansible.builtin.blockinfile:
        path: /etc/samba/smb.conf
        marker: "# {mark} ANSIBLE MANAGED — homelab data share"
        block: |
          [{{ samba_share_name }}]
             path = {{ samba_share_path }}
             browseable = yes
             read only = no
             guest ok = no
             valid users = {{ samba_user }}
             create mask = 0644
             directory mask = 0755

    - name: "[Samba] Garantir que o serviço está ativo"
      ansible.builtin.systemd:
        name: smbd
        state: restarted
        enabled: true

    - name: "[Samba] Lembrete — definir senha Samba manualmente"
      ansible.builtin.debug:
        msg: >
          AÇÃO MANUAL NECESSÁRIA: Execute 'smbpasswd -a root' no shell
          do pve-inspiron para definir a senha de acesso Samba.
          Depois acesse \\192.168.3.50\data no Windows Explorer do Lenovo.
