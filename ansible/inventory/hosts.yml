---
all:
  children:

    # ──────────────────────────────────────────────
    # BARE METAL — Dell Optiplex 7040
    # OpenClaw roda diretamente no hardware, sem Proxmox
    # ──────────────────────────────────────────────
    baremetal:
      hosts:
        lm-claw:
          ansible_host: "192.168.3.30"
          ansible_user: luismarquitti
          bare_metal_ip: "192.168.3.30"
          bare_metal_hostname: "lm-claw"
          bare_metal_mac: "74:86:7A:FA:8E:C8"
          # Hardware: i5-6500 @ 3.2GHz, 4c, 16GB DDR4, NVMe 238GB (OS) + HDD 298GB (storage)
          ollama_models:
            - gemma4:e2b
            - gemma3:4b
            - qwen3:8b
            - nomic-embed-text:latest


    # ──────────────────────────────────────────────
    # PROXMOX — Dell Inspiron 14R (único nó restante)
    # ──────────────────────────────────────────────
    proxmox:
      hosts:
        pve-inspiron:
          ansible_host: 192.168.3.50
          pve_node_name: pve-inspiron
          pve_is_primary: true   # único nó — primário por padrão
          storage_disks:
            data_storage:
              device: /dev/sdb1
              mount: /mnt/data
              fstype: ntfs-3g
              format: false  # NÃO FORMATAR — dados pessoais!
              content: "backup,iso"


    # ──────────────────────────────────────────────
    # LXCs no pve-inspiron
    # ──────────────────────────────────────────────
    lxc_inspiron:
      hosts:
        adguard:
          ansible_host: "192.168.3.5"
          lxc_ip: "192.168.3.5"
          lxc_hostname: "adguard"
          lxc_template: "debian-12-standard_12.12-1_amd64.tar.zst"
          lxc_cores: 1
          lxc_memory: 512
          lxc_disk: 4
          lxc_vmid: 100
          lxc_target_node: pve-inspiron

        nginx-proxy:
          ansible_host: "192.168.3.7"
          lxc_ip: "192.168.3.7"
          lxc_hostname: "nginx-proxy"
          lxc_template: "debian-12-standard_12.12-1_amd64.tar.zst"
          lxc_cores: 1
          lxc_memory: 1024
          lxc_disk: 8
          lxc_vmid: 102
          lxc_target_node: pve-inspiron

        uptime-kuma:
          ansible_host: "192.168.3.6"
          lxc_ip: "192.168.3.6"
          lxc_hostname: "uptime-kuma"
          lxc_template: "debian-12-standard_12.12-1_amd64.tar.zst"
          lxc_cores: 1
          lxc_memory: 512
          lxc_disk: 4
          lxc_vmid: 101
          lxc_target_node: pve-inspiron

        postgres-db:
          ansible_host: 192.168.3.20
          lxc_ip: "192.168.3.20"
          lxc_hostname: "postgres-db"
          lxc_template: "debian-12-standard_12.12-1_amd64.tar.zst"
          lxc_cores: 2
          lxc_memory: 2048
          lxc_disk: 10
          lxc_vmid: 104
          lxc_target_node: pve-inspiron


    # ──────────────────────────────────────────────
    # VMs no pve-inspiron
    # ──────────────────────────────────────────────
    inspiron_vms:
      hosts:
        homeassistant-server:
          ansible_host: "192.168.3.22"
          ansible_user: root
          vm_name: "homeassistant-server"
          vmid: 151
          target_node: pve-inspiron
          vm_mac: "02:37:DE:E7:F3:31"
          vm_memory: 2048
          vm_cores: 2
          vm_disk_main: "local-lvm:vm-101-disk-0"  # 32GB
          vm_disk_efi: "local-lvm:vm-101-disk-1"   # 4MB
