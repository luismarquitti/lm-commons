      hosts:
        openclaw-server:
          ansible_host: "192.168.3.19"
          ansible_user: luismarquitti
          vm_name: "OpenClaw-Server"
          vmid: 150
          target_node: pve-inspiron
          vm_mac: "BC:24:11:A5:32:E5"
          vm_memory: 4096
          vm_cores: 2
          vm_disk_main: "local-lvm:vm-100-disk-1"  # 128GB
          vm_disk_efi: "local-lvm:vm-100-disk-0"   # 4MB
