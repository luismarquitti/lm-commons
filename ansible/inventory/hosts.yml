---
all:
  children:
    proxmox:
      hosts:
        pve-optiplex:
          ansible_host: 192.168.3.10
          pve_node_name: pve-optiplex
          pve_is_primary: true
          storage_disks:
            pve_storage:
              device: /dev/sdb1
              mount: /mnt/pve-storage
              fstype: ext4
              format: true
              content: "images,rootdir,backup,iso,snippets,vztmpl"
            data_storage:
              device: /dev/sda1
              mount: /mnt/data
              fstype: ntfs-3g
              format: false  # NÃO FORMATAR — dados pessoais!
              content: "backup,iso"
        pve-inspiron:
          ansible_host: 192.168.3.50
          pve_node_name: pve-inspiron
          pve_is_primary: false


    # LXCs a serem criados no pve-optiplex
    lxc_optiplex:
      hosts:
        adguard:
          lxc_ip: "192.168.3.5"
          lxc_hostname: "adguard"
          lxc_template: "debian-12-standard_12.12-1_amd64.tar.zst"
          lxc_cores: 1
          lxc_memory: 512
          lxc_disk: 4
          lxc_vmid: 100
          lxc_target_node: pve-optiplex

        nginx-proxy:
          lxc_ip: "192.168.3.7"
          lxc_hostname: "nginx-proxy"
          lxc_template: "debian-12-standard_12.12-1_amd64.tar.zst"
          lxc_cores: 1
          lxc_memory: 1024
          lxc_disk: 8
          lxc_vmid: 102
          lxc_target_node: pve-optiplex

        openclaw-prod:
          ansible_host: "192.168.3.30"
          lxc_ip: "192.168.3.30"
          lxc_hostname: "openclaw-prod"
          lxc_template: "debian-12-standard_12.12-1_amd64.tar.zst"
          lxc_cores: 3
          lxc_memory: 12288
          lxc_disk: 128
          lxc_vmid: 200
          lxc_target_node: pve-optiplex


    # LXCs a serem criados no pve-inspiron
    lxc_inspiron:
      hosts:
        n8n:
          lxc_ip: "192.168.3.11"
          lxc_hostname: "n8n"
          lxc_template: "debian-12-standard_12.12-1_amd64.tar.zst"
          lxc_cores: 2
          lxc_memory: 1024
          lxc_disk: 8
          lxc_vmid: 110
          lxc_target_node: pve-inspiron
        memos:
          lxc_ip: "192.168.3.12"
          lxc_hostname: "memos"
          lxc_template: "debian-12-standard_12.12-1_amd64.tar.zst"
          lxc_cores: 1
          lxc_memory: 256
